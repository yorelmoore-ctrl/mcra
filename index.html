<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Evidence I Exist</title>

  <meta name="theme-color" content="#a688d4">
  <meta name="description" content="A digital sanctuary for healing, recovery, emotional regulation, and becoming.">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <header class="topbar fade-in">
    <h1>Evidence I Exist</h1>
    <p>Your digital sanctuary ✨</p>
  </header>

  <main>

    <section class="panel fade-in">

      <h2>Mood Tracker</h2>

      <select id="mood">
        <option value="">Choose your mood</option>
        <option>Peaceful</option>
        <option>Overwhelmed</option>
        <option>Hopeful</option>
        <option>Disconnected</option>
        <option>Grounded</option>
      </select>

      <button id="saveMood">Save Mood</button>

    </section>

    <section class="panel fade-in">

      <h2>Water Tracker</h2>

      <div class="water-controls">

        <button id="waterMinus">-</button>

        <span id="waterCount">0</span>

        <button id="waterPlus">+</button>

      </div>

    </section>

    <section class="panel fade-in">

      <h2>Daily Reflection</h2>

      <textarea
        id="journal"
        placeholder="Write your thoughts here..."
      ></textarea>

      <button id="saveJournal">Save Entry</button>

    </section>

    <section class="panel fade-in">

      <h2>Oracle Message</h2>

      <button id="oracleBtn">Reveal Message</button>

      <p id="oracleText"></p>

    </section>

    <section class="panel fade-in">

      <h2>Main Character Quest</h2>

      <ul id="questList"></ul>

    </section>

  </main>

  <div id="toast"></div>

  <script src="script.js"></script>

</body>

</html>
